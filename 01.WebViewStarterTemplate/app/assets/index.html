  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ImpulseBin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <div class="app-logo">⚡</div>
        <div class="app-name">ImpulseBin</div>
      </div>
      <div class="header-right">
        <select id="lang-select" class="lang-select">
          <option value="en">🇬🇧 EN</option>
          <option value="uk">🇺🇦 UA</option>
          <option value="pl">🇵🇱 PL</option>
          <option value="de">🇩🇪 DE</option>
          <option value="fr">🇫🇷 FR</option>
          <option value="es">🇪🇸 ES</option>
          <option value="zh">🇨🇳 ZH</option>
        </select>
        <button id="btn-strict" class="icon-btn strict-btn" title="Strict Mode" aria-label="Strict Mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
        </button>
        <button id="btn-export" class="icon-btn" aria-label="Export">📤</button>
        <button id="btn-archive" class="icon-btn" aria-label="Archive">📦</button>
      </div>
    </header>

    <!-- MAIN SCREEN -->
    <div id="screen-main" class="screen active">
      <!-- HERO -->
      <div class="savings-hero">
        <div class="savings-label" id="hero-label">Saved</div>
        <div class="savings-amount">
          <span id="hero-currency">$</span><span id="hero-amount">0</span>
        </div>
        <div class="savings-sub" id="hero-sub">all time</div>
      </div>

      <!-- STATS -->
      <div class="stats-bar">
        <div class="stat-pill">
          <div class="stat-val" id="stat-active">0</div>
          <div class="stat-lbl" id="stat-active-label">active</div>
        </div>
        <div class="stat-pill">
          <div class="stat-val" id="stat-done">0</div>
          <div class="stat-lbl" id="stat-done-label">done</div>
        </div>
        <div class="stat-pill">
          <div class="stat-val" id="stat-canceled">0</div>
          <div class="stat-lbl" id="stat-canceled-label">skipped</div>
        </div>
      </div>

      <!-- LIST -->
      <div class="list-section">
        <div class="list-header">
          <div class="list-title" id="list-title-active">My Impulses</div>
          <div id="pro-badge" class="pro-badge" style="display:none;">PRO</div>
          <div id="limit-badge" class="limit-badge"></div>
        </div>

        <div id="impulse-list" class="impulse-list"></div>

        <div id="empty-state" class="empty-state">
          <div class="empty-icon">💸</div>
          <p id="empty-text">No impulses yet. Add your first!</p>
        </div>
      </div>

      <button id="btn-add" class="fab" aria-label="Add impulse">+</button>
    </div>

    <!-- ARCHIVE SCREEN -->
    <div id="screen-archive" class="screen">
      <div class="screen-nav">
        <button id="btn-back-archive" class="back-btn">← <span id="btn-back-label">Back</span></button>
        <h2 id="archive-title">📦 Archive</h2>
      </div>
      <div class="list-section">
        <div id="archive-list" class="impulse-list"></div>
        <div id="archive-empty" class="empty-state" style="display:none;">
          <div class="empty-icon">🕊️</div>
          <p id="archive-empty-text">Archive is empty.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD MODAL -->
  <div id="modal-add" class="modal-overlay">
    <div class="modal-sheet">
      <div class="modal-drag-handle"></div>
      <h2 class="modal-title" id="modal-title">New Impulse</h2>
      <p class="modal-hint" id="modal-hint">Describe what you want to buy and set a pause.</p>

      <div id="strict-notice" class="strict-notice" style="display:none;">
        <span>🛡️</span>
        <span id="strict-notice-text">Strict mode: skip is disabled</span>
      </div>

      <label class="field-label" id="label-text">What do you want to buy?</label>
      <input id="input-text" class="field-input" placeholder="New headphones, a game..." type="text">

      <label class="field-label" id="label-amount">Amount ($)</label>
      <input id="input-amount" class="field-input" type="number" placeholder="0">

      <label class="field-label" id="label-delay">Delay before purchase</label>
      <div class="delay-grid">
        <button class="delay-chip active" data-hours="1" id="delay-1h">1 hr</button>
        <button class="delay-chip" data-hours="6" id="delay-6h">6 hr</button>
        <button class="delay-chip" data-hours="24" id="delay-24h">24 hr</button>
        <button class="delay-chip" data-hours="72" id="delay-72h">3 days</button>
        <button class="delay-chip" data-hours="168" id="delay-168h">7 days</button>
        <button class="delay-chip" data-hours="720" id="delay-720h">30 days</button>
      </div>

      <div class="modal-actions">
        <button id="btn-cancel-modal" class="btn-secondary">Cancel</button>
        <button id="btn-save-impulse" class="btn-primary">Lock 🔒</button>
      </div>
    </div>
  </div>

  <!-- PRO MODAL -->
  <div id="modal-pro" class="modal-overlay">
    <div class="modal-sheet modal-pro-sheet">
      <div class="pro-star">⭐</div>
      <h2 class="modal-title" id="pro-title">ImpulseBin Pro</h2>
      <p class="pro-desc" id="pro-desc">Unlimited impulses and data export.</p>
      <ul class="pro-features" id="pro-features"></ul>
      <div class="modal-actions">
        <button id="btn-pro-close" class="btn-secondary">Stay on Free</button>
        <button id="btn-pro-buy" class="btn-primary btn-pro-cta">Upgrade to Pro</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
